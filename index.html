<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>노담 노술</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/toss/tossface/dist/tossface.css">
    
    <style>
        /* 프리미엄 모던 플랫 & 다크모드 설정 */
        :root {
            --bg-color: #F2F4F6; /* 토스 스타일의 밝고 부드러운 회색 */
            --text-color: #191F28; 
            --card-bg: #ffffff;
            --sub-text: #8B95A1; 
            --tab-bg: #E5E8EB; 
            --modal-bg: rgba(0,0,0,0.4);
            
            /* 파스텔톤 그라데이션으로 변경 */
            --accent-smoke: linear-gradient(135deg, #FF7B8E, #FF5B73);
            --smoke-light: linear-gradient(135deg, #FFF0F2, #FFE5E8);
            
            --accent-drink: linear-gradient(135deg, #5C80FF, #4068FF);
            --drink-light: linear-gradient(135deg, #F0F4FF, #E5EDFF);
            
            --accent-money: linear-gradient(135deg, #34C759, #30D158);
            
            --shadow-sm: 0 4px 16px rgba(0,0,0,0.04);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.08);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #101013; --text-color: #F9FAFB; --card-bg: #1C1C1F;
                --sub-text: #8B95A1; --tab-bg: #2C2C35; --modal-bg: rgba(0,0,0,0.7);
                --smoke-light: linear-gradient(135deg, #3A1D22, #2A1215);
                --drink-light: linear-gradient(135deg, #1A233A, #12182A);
                --shadow-sm: 0 4px 16px rgba(0,0,0,0.3);
                --shadow-lg: 0 20px 40px rgba(0,0,0,0.5);
            }
        }

        body {
            margin: 0; 
            /* 토스페이스 폰트 우선 적용 */
            font-family: 'Tossface', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: var(--bg-color); color: var(--text-color);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .header {
            background: transparent;
            color: var(--text-color); text-align: center;
            padding: calc(env(safe-area-inset-top) + 20px) 15px 15px 15px;
            font-size: 24px; font-weight: 800; letter-spacing: -0.5px;
            z-index: 10;
        }

        .mode-selector {
            display: flex; gap: 8px; padding: 6px; margin: 0 20px 15px 20px;
            background: var(--tab-bg); border-radius: 20px; z-index: 5;
        }
        .mode-btn {
            flex: 1; padding: 14px; border: none; border-radius: 14px;
            background: transparent; color: var(--sub-text); font-weight: 700; 
            font-size: 15px; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .mode-btn.active {
            background: var(--card-bg); color: var(--text-color);
            box-shadow: var(--shadow-sm);
        }

        .container {
            max-width: 500px; margin: auto; padding: 0 20px 20px 20px; display: flex; flex-direction: column; gap: 25px;
            flex-grow: 1; justify-content: flex-start; width: 100%; box-sizing: border-box; overflow-y: auto;
            scrollbar-width: none;
        }
        .container::-webkit-scrollbar { display: none; }

        /* [디자인 변경] 카드 레이아웃 앱 스타일로 고도화 */
       .card {
    background: var(--card-bg); border-radius: 32px; 
    box-shadow: var(--shadow-lg); position: relative; display: flex; flex-direction: column;
    transition: transform 0.2s;
    overflow: hidden; /* 헤더 둥근 모서리 적용을 위해 */
    flex-shrink: 0; /* ✨ 이 부분을 추가해 주세요! 카드가 찌그러지는 현상 방지 */
}
        .card.hidden { display: none !important; }

        /* [추가] 히어로(Hero) 헤더 영역 - 일러스트/아이콘 자리 */
        .card-hero {
            height: 120px;
            display: flex; justify-content: center; align-items: flex-end;
            position: relative;
        }
        .smoke-hero { background: var(--smoke-light); }
        .drink-hero { background: var(--drink-light); }
        
        .hero-icon {
            font-size: 50px;
            background: var(--card-bg);
            width: 90px; height: 90px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            transform: translateY(45px); /* 아래 본문 영역으로 반쯤 내려오게 겹침 */
            z-index: 2;
        }

        /* [추가] 카드 본문 영역 */
        .card-body {
            padding: 55px 24px 30px 24px; /* 위쪽 여백을 줘서 겹친 아이콘 피하기 */
            display: flex; flex-direction: column; gap: 16px; text-align: center;
        }
        
        .card-header-text { display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 5px; }
        .title { font-size: 16px; font-weight: 700; color: var(--sub-text); }
        .streak { 
            background: rgba(255, 159, 67, 0.15); color: #FF8A00; 
            padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 800; 
        }

        .time-display { font-size: clamp(34px, 8vw, 42px); font-weight: 900; letter-spacing: -1.5px; margin: 0; color: var(--text-color); }
        
        /* 절약 금액 UI 깔끔하게 */
        .saved-money {
            background: var(--bg-color); color: var(--text-color);
            padding: 16px; border-radius: 20px; font-size: 20px; font-weight: 800;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            border: 2px solid rgba(52, 199, 89, 0.15);
        }
        .money-icon { color: #34C759; font-size: 24px; }

        .highlight-stat { font-size: 15px; font-weight: 600; color: var(--sub-text); background: var(--tab-bg); padding: 12px; border-radius: 16px; }
        .stat-num { font-size: 18px; font-weight: 800; color: #FF5B73; } 
        .stat-num.drink { color: #5C80FF; } 

        /* [디자인 변경] 건강 회복 상태 메시지를 모던 위젯 스타일로 */
        .health-msg {
            background: var(--bg-color);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            text-align: left;
            margin-top: 5px;
        }
        .health-icon-wrapper {
            background: var(--card-bg);
            width: 44px; height: 44px; flex-shrink: 0;
            border-radius: 14px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: var(--shadow-sm);
            font-size: 20px;
        }
        .health-text-content { display: flex; flex-direction: column; gap: 4px; }
        .health-label { font-size: 12px; font-weight: 800; color: #34C759; }
        #smokeHealthText, #drinkHealthText { font-size: 14px; font-weight: 600; line-height: 1.4; color: var(--text-color); }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .button {
            padding: 18px; border-radius: 20px; font-weight: 800; font-size: 17px; 
            cursor: pointer; border: none; color: white;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .button:active { transform: scale(0.96); }
        .smoke-btn { background: var(--accent-smoke); box-shadow: 0 8px 20px rgba(255, 91, 115, 0.25); } 
        .drink-btn { background: var(--accent-drink); box-shadow: 0 8px 20px rgba(92, 128, 255, 0.25); }
        .reset-btn { background: transparent; color: var(--sub-text); font-size: 14px; font-weight: 600; text-decoration: underline; text-underline-offset: 4px; box-shadow: none; padding: 10px; margin-top: 5px; }

        .settings-area { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 10px; }
        .settings-btn {
            background: var(--card-bg); color: var(--text-color); border: none; padding: 18px;
            border-radius: 24px; font-size: 15px; font-weight: 700; cursor: pointer; 
            box-shadow: var(--shadow-sm); display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: transform 0.1s;
        }
        .settings-btn:active { transform: scale(0.96); }

        .footer-notice { text-align: center; font-size: 12px; color: var(--sub-text); margin-bottom: 30px; font-weight: 600; }

        /* 모달 스타일 유지 & 테두리 곡률 증가 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--modal-bg);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.25s ease; backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: var(--card-bg); padding: 30px 25px; border-radius: 32px; width: 85%; max-width: 320px;
            text-align: center; box-shadow: var(--shadow-lg); transform: translateY(30px) scale(0.95); transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 80vh; overflow-y: auto;
        }
        .modal-overlay.active .modal-box { transform: translateY(0) scale(1); }
        .modal-msg { font-size: 18px; font-weight: 800; line-height: 1.5; margin-bottom: 25px; white-space: pre-wrap; color: var(--text-color); }
        
        .modal-textarea { width: 100%; height: 80px; margin-bottom: 20px; border-radius: 16px; border: 1px solid var(--tab-bg); padding: 12px; box-sizing: border-box; background: var(--bg-color); color: var(--text-color); font-size: 13px; }
        
        .input-group { text-align: left; margin-bottom: 18px; }
        .input-group label { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 700; color: var(--sub-text); margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 16px; border-radius: 18px; border: none; background: var(--bg-color); color: var(--text-color); font-size: 18px; font-weight: 800; box-sizing: border-box; }
        .input-group input:focus { outline: 2px solid #5C80FF; }

        .modal-btn-group { display: flex; gap: 12px; margin-top: 10px; }
        .modal-btn { flex: 1; padding: 18px; border: none; border-radius: 20px; font-weight: 800; font-size: 16px; cursor: pointer; }
        .btn-cancel { background: var(--tab-bg); color: var(--sub-text); }
        .btn-confirm { background: var(--text-color); color: var(--bg-color); }
    </style>
</head>
<body>

<div class="header">나의 기록 🏆</div>

<div class="mode-selector">
    <button class="mode-btn active" data-mode="both">둘 다</button>
    <button class="mode-btn" data-mode="smoke">금연만</button>
    <button class="mode-btn" data-mode="drink">금주만</button>
</div>

<div class="container">
    <div class="card smoke-card" id="smokeCard">
        <div class="card-hero smoke-hero">
            <div class="hero-icon">🚭</div>
        </div>
        
        <div class="card-body">
            <div class="card-header-text">
                <div class="title">금연 시간</div>
                <div class="streak" id="smokeStreak">🔥 0일째</div>
            </div>
            <div class="time-display" id="smokeTime">0일 00:00:00</div>
            
            <div class="saved-money">
                <span class="material-symbols-rounded money-icon">payments</span>
                <span id="smokeMoney" data-val="0">0원 절약!</span>
            </div>
            
            <div class="highlight-stat">오늘의 유혹 🚬 <span class="stat-num" id="todaySmoke">0</span>번 실패</div>
            
            <div id="smokeHealth" class="health-msg">
                <div class="health-icon-wrapper">🌿</div>
                <div class="health-text-content">
                    <span class="health-label">내 몸의 변화</span>
                    <span id="smokeHealthText">건강 데이터 분석 중...</span>
                </div>
            </div>

            <div class="btn-group">
                <button class="button smoke-btn" onclick="askRecord('smoke')">
                    방금 피웠음 🥲
                </button>
                <button class="button reset-btn" onclick="askReset('smoke')">기록 완전 초기화</button>
            </div>
        </div>
    </div>

    <div class="card drink-card" id="drinkCard">
        <div class="card-hero drink-hero">
            <div class="hero-icon">🚫</div>
        </div>
        
        <div class="card-body">
            <div class="card-header-text">
                <div class="title">금주 기간</div>
                <div class="streak" id="drinkStreak">🔥 0일째</div>
            </div>
            <div class="time-display" id="drinkDay">0일</div>
            
            <div class="saved-money">
                <span class="material-symbols-rounded money-icon">payments</span>
                <span id="drinkMoney" data-val="0">0원 절약!</span>
            </div>
            
            <div class="highlight-stat">최근 7일 유혹 🍺 <span class="stat-num drink" id="weekDrink">0</span>번 실패</div>
            
            <div id="drinkHealth" class="health-msg">
                <div class="health-icon-wrapper">💧</div>
                <div class="health-text-content">
                    <span class="health-label">내 몸의 변화</span>
                    <span id="drinkHealthText">건강 데이터 분석 중...</span>
                </div>
            </div>

            <div class="btn-group">
                <button class="button drink-btn" onclick="askRecord('drink')">
                    방금 마셨음 🥲
                </button>
                <button class="button reset-btn" onclick="askReset('drink')">기록 완전 초기화</button>
            </div>
        </div>
    </div>

    <div class="settings-area">
        <button class="settings-btn" onclick="openSettingsModal()">⚙️ 비용 설정</button>
        <button class="settings-btn" onclick="setupNotification()">🔔 알림 권한</button>
        <button class="settings-btn" onclick="backupData()">💾 백업</button>
        <button class="settings-btn" onclick="showRestoreModal()">📂 복원</button>
    </div>

    <div class="footer-notice">※ 건강 정보는 WHO/CDC 기준 평균 데이터 기반 안내입니다</div>
</div>

<div class="modal-overlay" id="customModal">
    <div class="modal-box">
        <div class="modal-msg" id="modalMsg">메시지</div>
        <textarea class="modal-textarea" id="modalInput" style="display:none;" placeholder="여기에 백업 데이터를 붙여넣으세요"></textarea>
        <div class="modal-btn-group">
            <button class="modal-btn btn-cancel" onclick="closeModal()">취소</button>
            <button class="modal-btn btn-confirm" id="modalConfirmBtn">확인</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settingsModal">
    <div class="modal-box">
        <div class="modal-msg" style="margin-bottom: 25px;">⚙️ 비용 상세 설정</div>
        
        <div class="input-group">
            <label>담배 1갑 가격</label>
            <input type="number" id="setSmokePrice" placeholder="예: 4500">
        </div>
        <div class="input-group">
            <label>하루 평균 흡연량 (개비)</label>
            <input type="number" id="setSmokePerDay" placeholder="예: 10">
        </div>
        <div class="input-group">
            <label>1주 평균 음주 횟수</label>
            <input type="number" id="setDrinkPerWeek" placeholder="예: 2">
        </div>
        <div class="input-group">
            <label>1회 평균 음주 비용</label>
            <input type="number" id="setDrinkCost" placeholder="예: 50000">
        </div>

        <div class="modal-btn-group">
            <button class="modal-btn btn-cancel" onclick="closeSettingsModal()">취소</button>
            <button class="modal-btn btn-confirm" onclick="saveSettings()">저장</button>
        </div>
    </div>
</div>

<script>
// 건강 회복 단계 시스템 데이터
const smokeStages = [
    { day: 0, msg: "금연을 결심하셨군요! 몸이 회복될 준비를 시작합니다." },
    { day: 0.013, msg: "마지막 흡연 후 20분: 혈압과 맥박이 정상으로 떨어지기 시작합니다." },
    { day: 0.5, msg: "12시간 경과: 혈액 속 일산화탄소가 정상 수치로 돌아왔습니다." },
    { day: 1, msg: "1일 경과: 심장마비 위험이 감소하기 시작합니다." },
    { day: 2, msg: "2일 경과: 신경 말단이 회복되며 후각과 미각이 좋아집니다." },
    { day: 3, msg: "3일 경과: 니코틴이 완전히 빠져나가고 기관지가 이완됩니다." },
    { day: 14, msg: "2주 경과: 폐 기능이 향상되고 혈액순환이 크게 개선됩니다." },
    { day: 30, msg: "1개월 경과: 기침과 숨가쁨이 눈에 띄게 줄어듭니다." },
    { day: 90, msg: "3개월 경과: 섬모 기능이 회복되어 폐 감염 위험이 줄어듭니다." },
    { day: 365, msg: "1년 달성! 관상동맥질환 위험이 절반으로 줄었습니다." },
    { day: 1825, msg: "5년 달성! 각종 암 발생 위험이 절반으로 감소했습니다." }
];

const drinkStages = [
    { day: 0, msg: "금주를 시작했습니다! 간이 쉴 수 있는 시간을 주셨네요." },
    { day: 0.5, msg: "12시간 경과: 혈당이 안정화되고 탈수 증상이 개선되기 시작합니다." },
    { day: 1, msg: "1일 경과: 체내 알코올이 완전히 분해되었습니다." },
    { day: 3, msg: "3일 경과: 숙취가 완전히 사라지고 수면의 질이 향상됩니다." },
    { day: 7, msg: "1주 경과: 집중력이 좋아지고 피부가 한결 맑아집니다." },
    { day: 14, msg: "2주 경과: 체중 감량 효과가 나타나며 위장 기능이 회복됩니다." },
    { day: 30, msg: "1개월 경과: 간 내 지방이 감소하고 수치가 정상화됩니다." },
    { day: 90, msg: "3개월 경과: 에너지가 상승하고 우울/불안감이 크게 감소합니다." },
    { day: 365, msg: "1년 달성! 면역력이 강화되고 심혈관 질환 위험이 감소했습니다." }
];

// 데이터 초기화
function initData() {
    let now = Date.now();
    if (!localStorage.getItem("smokeStart")) localStorage.setItem("smokeStart", now);
    if (!localStorage.getItem("drinkStart")) localStorage.setItem("drinkStart", now);
    if (!localStorage.getItem("smokeLogs")) localStorage.setItem("smokeLogs", JSON.stringify([]));
    if (!localStorage.getItem("drinkLogs")) localStorage.setItem("drinkLogs", JSON.stringify([]));
    
    if (!localStorage.getItem("smokePrice")) localStorage.setItem("smokePrice", "4500");
    if (!localStorage.getItem("smokePerDay")) localStorage.setItem("smokePerDay", "10");
    if (!localStorage.getItem("drinkPerWeek")) localStorage.setItem("drinkPerWeek", "2");
    if (!localStorage.getItem("drinkCost")) localStorage.setItem("drinkCost", "50000");
}
initData();

// 숫자 애니메이션
function animateValue(obj, start, end, duration) {
    let startTimestamp = null;
    const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        const easeOut = 1 - Math.pow(1 - progress, 4);
        const currentVal = Math.floor(easeOut * (end - start) + start);
        
        obj.innerText = currentVal.toLocaleString() + "원 절약!";
        
        if (progress < 1) {
            window.requestAnimationFrame(step);
        } else {
            obj.dataset.val = end;
        }
    };
    window.requestAnimationFrame(step);
}

// 모달 로직
const modal = document.getElementById('customModal');
const modalMsg = document.getElementById('modalMsg');
const modalInput = document.getElementById('modalInput');
const confirmBtn = document.getElementById('modalConfirmBtn');
let confirmAction = null;

function showModal(msg, action, showInput = false) {
    modalMsg.innerText = msg;
    confirmAction = action;
    modalInput.style.display = showInput ? 'block' : 'none';
    if(showInput) modalInput.value = '';
    modal.classList.add('active');
}
function closeModal() { modal.classList.remove('active'); confirmAction = null; }
confirmBtn.addEventListener('click', () => {
    if (confirmAction) confirmAction(modalInput.value);
    closeModal();
});

// 설정 모달 로직
const settingsModal = document.getElementById('settingsModal');
function openSettingsModal() {
    document.getElementById('setSmokePrice').value = localStorage.getItem("smokePrice");
    document.getElementById('setSmokePerDay').value = localStorage.getItem("smokePerDay");
    document.getElementById('setDrinkPerWeek').value = localStorage.getItem("drinkPerWeek");
    document.getElementById('setDrinkCost').value = localStorage.getItem("drinkCost");
    settingsModal.classList.add('active');
}
function closeSettingsModal() { settingsModal.classList.remove('active'); }
function saveSettings() {
    localStorage.setItem("smokePrice", document.getElementById('setSmokePrice').value || 4500);
    localStorage.setItem("smokePerDay", document.getElementById('setSmokePerDay').value || 10);
    localStorage.setItem("drinkPerWeek", document.getElementById('setDrinkPerWeek').value || 2);
    localStorage.setItem("drinkCost", document.getElementById('setDrinkCost').value || 50000);
    closeSettingsModal();
    
    document.getElementById("smokeMoney").dataset.val = "0";
    document.getElementById("drinkMoney").dataset.val = "0";
    update(); 
}

// 시간 계산 유틸리티
function getTime(ms) {
    let sec = Math.floor(ms / 1000); let min = Math.floor(sec / 60);
    let hour = Math.floor(min / 60); let day = Math.floor(hour / 24);
    return { day, hour: hour % 24, min: min % 60, sec: sec % 60 };
}
function getDurationText(ms, type) {
    let s = getTime(ms);
    if (type === 'smoke') {
        if (s.day > 0) return `${s.day}일 ${s.hour}시간`;
        if (s.hour > 0) return `${s.hour}시간 ${s.min}분`;
        return `${s.min}분`;
    } else {
        return s.day > 0 ? `${s.day}일` : (s.hour > 0 ? `${s.hour}시간` : `방금 전`);
    }
}

// 건강 메시지 계산
function getStageMessage(startTime, stages) {
    let elapsedDays = (Date.now() - startTime) / (1000 * 60 * 60 * 24);
    let currentMsg = stages[0].msg;
    for (let i = 0; i < stages.length; i++) {
        if (elapsedDays >= stages[i].day) currentMsg = stages[i].msg;
        else break;
    }
    return currentMsg;
}

// 기록 & 초기화
function askRecord(type) {
    let now = Date.now();
    let startTime = parseInt(localStorage.getItem(type + "Start"));
    let text = getDurationText(now - startTime, type);
    let msg = type === 'smoke' 
        ? `🚬 ${text}이나 참았는데 정말 피우시겠습니까?\n\n(절약 금액이 초기화됩니다)`
        : `🍺 ${text}이나 참았는데 정말 마시겠습니까?\n\n(절약 금액이 초기화됩니다)`;
    showModal(msg, () => recordEvent(type));
}

function recordEvent(type) {
    if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
    let now = Date.now();
    let logs = JSON.parse(localStorage.getItem(type + "Logs")) || [];
    logs.push(now);
    localStorage.setItem(type + "Logs", JSON.stringify(logs));
    localStorage.setItem(type + "Start", now);
    document.getElementById(type + "Money").dataset.val = "0";
    update();
}

function askReset(type) {
    let name = type === 'smoke' ? '금연' : '금주';
    showModal(`${name} 기록을 완전히 처음부터 다시 시작할까요?`, () => {
        localStorage.setItem(type + "Start", Date.now());
        localStorage.setItem(type + "Logs", JSON.stringify([]));
        document.getElementById(type + "Money").dataset.val = "0";
        update();
    });
}

// 백업 & 알림
function backupData() {
    let data = JSON.stringify(localStorage);
    navigator.clipboard.writeText(data).then(() => {
        showModal("✅ 백업 완료!\n클립보드에 복사되었습니다. 안전한 곳에 붙여넣기 하세요.", null);
    }).catch(() => {
        showModal("아래 텍스트를 모두 복사하세요.", null, true);
        document.getElementById('modalInput').value = data;
    });
}
function showRestoreModal() {
    showModal("📂 복원할 백업 텍스트를 붙여넣으세요.", (inputData) => {
        try {
            let data = JSON.parse(inputData);
            for (let key in data) localStorage.setItem(key, data[key]);
            document.getElementById("smokeMoney").dataset.val = "0";
            document.getElementById("drinkMoney").dataset.val = "0";
            update();
            setTimeout(() => alert("데이터 복원 완료!"), 100);
        } catch(e) { alert("잘못된 데이터입니다."); }
    }, true);
}
function setupNotification() {
    if (!("Notification" in window)) { alert("알림을 지원하지 않는 기기입니다."); return; }
    Notification.requestPermission().then(permission => {
        if(permission === "granted") showModal("✅ 알림 권한 허용됨\n매일 아침 기록을 알려드립니다.", null);
        else showModal("알림 권한이 거부되었습니다.", null);
    });
}
function checkDailyNotification() {
    let lastNoti = localStorage.getItem("lastNotification");
    let today = new Date().toDateString();
    let now = new Date();
    if (now.getHours() >= 9 && lastNoti !== today && Notification.permission === "granted") {
        let smokeStart = parseInt(localStorage.getItem("smokeStart"));
        let sDays = Math.floor((Date.now() - smokeStart) / (24*60*60*1000));
        new Notification("오늘의 나의 기록", { body: `현재 금연 ${sDays}일째 유지 중입니다! 🔥`, icon: "icon.png" });
        localStorage.setItem("lastNotification", today);
    }
}

// 화면 업데이트
function update() {
    let now = Date.now();
    let smokeStart = parseInt(localStorage.getItem("smokeStart"));
    let drinkStart = parseInt(localStorage.getItem("drinkStart"));

    let s = getTime(now - smokeStart);
    document.getElementById("smokeTime").innerText = `${s.day}일 ${String(s.hour).padStart(2, '0')}:${String(s.min).padStart(2, '0')}:${String(s.sec).padStart(2, '0')}`;
    let dDay = Math.floor((now - drinkStart) / (24 * 60 * 60 * 1000));
    document.getElementById("drinkDay").innerText = `${dDay}일`;
    
    document.getElementById("smokeStreak").innerText = `🔥 ${s.day}일째`;
    document.getElementById("drinkStreak").innerText = `🔥 ${dDay}일째`;

    let smokePrice = parseInt(localStorage.getItem("smokePrice"));
    let smokePerDay = parseInt(localStorage.getItem("smokePerDay"));
    let smokeDaysExact = Math.max(0, (now - smokeStart) / (1000 * 60 * 60 * 24));
    let targetSmokeMoney = Math.floor(smokeDaysExact * smokePerDay * (smokePrice / 20));
    
    let drinkPerWeek = parseInt(localStorage.getItem("drinkPerWeek"));
    let drinkCost = parseInt(localStorage.getItem("drinkCost"));
    let drinkDaysExact = Math.max(0, (now - drinkStart) / (1000 * 60 * 60 * 24));
    let targetDrinkMoney = Math.floor(drinkDaysExact * (drinkPerWeek / 7) * drinkCost);

    let currentSmokeVal = parseInt(document.getElementById("smokeMoney").dataset.val) || 0;
    if (Math.abs(targetSmokeMoney - currentSmokeVal) > 100) {
        animateValue(document.getElementById("smokeMoney"), 0, targetSmokeMoney, 1200);
    } else {
        document.getElementById("smokeMoney").innerText = targetSmokeMoney.toLocaleString() + "원 절약!";
        document.getElementById("smokeMoney").dataset.val = targetSmokeMoney;
    }

    let currentDrinkVal = parseInt(document.getElementById("drinkMoney").dataset.val) || 0;
    if (Math.abs(targetDrinkMoney - currentDrinkVal) > 100) {
        animateValue(document.getElementById("drinkMoney"), 0, targetDrinkMoney, 1200);
    } else {
        document.getElementById("drinkMoney").innerText = targetDrinkMoney.toLocaleString() + "원 절약!";
        document.getElementById("drinkMoney").dataset.val = targetDrinkMoney;
    }

    let smokeLogs = JSON.parse(localStorage.getItem("smokeLogs")) || [];
    let drinkLogs = JSON.parse(localStorage.getItem("drinkLogs")) || [];
    let todayStart = new Date().setHours(0, 0, 0, 0);
    let weekAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);

    document.getElementById("todaySmoke").innerText = smokeLogs.filter(t => t > todayStart).length;
    document.getElementById("weekDrink").innerText = drinkLogs.filter(t => t > weekAgo).length;

    document.getElementById("smokeHealthText").innerText = getStageMessage(smokeStart, smokeStages);
    document.getElementById("drinkHealthText").innerText = getStageMessage(drinkStart, drinkStages);

    checkDailyNotification();
}

const modeBtns = document.querySelectorAll('.mode-btn');
const smokeCard = document.getElementById('smokeCard');
const drinkCard = document.getElementById('drinkCard');

function setMode(mode) {
    localStorage.setItem('appMode', mode);
    modeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
    smokeCard.classList.toggle('hidden', mode === 'drink');
    drinkCard.classList.toggle('hidden', mode === 'smoke');
}
setMode(localStorage.getItem('appMode') || 'both');
modeBtns.forEach(btn => btn.addEventListener('click', () => setMode(btn.dataset.mode)));

setInterval(update, 1000);
update();

</script>
